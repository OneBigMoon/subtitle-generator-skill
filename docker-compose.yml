version: '3.8'

# =============================================================================
# 字幕生成器 / 字幕打轴工具 - Docker Compose 配置
# =============================================================================
# 
# 使用说明:
# 1. 复制此文件到您的项目目录
# 2. 根据需要调整下方的配置参数
# 3. 运行: docker-compose up -d
# 4. 访问: http://localhost:8000
#
# 常用命令:
#   docker-compose up -d      # 启动服务（后台运行）
#   docker-compose down       # 停止服务
#   docker-compose logs -f    # 查看日志
#   docker-compose ps         # 查看状态
#   docker-compose pull       # 更新镜像
# =============================================================================

services:
  subtitle-generator:
    # 镜像来源（二选一）:
    # 选项1: 使用 Docker Hub 上的预构建镜像（推荐，无需本地构建）
    image: onebigmoon/subtitle-generator:latest
    
    # 选项2: 本地构建（适合二次开发）
    # build: .
    # image: subtitle-generator:latest
    
    container_name: subtitle-generator-api
    
    # =========================================================================
    # 端口映射配置
    # =========================================================================
    # 如果 8000 端口被占用，可以修改为其他端口，例如:
    # ports:
    #   - "8080:8000"    # 主机8080端口映射到容器8000端口
    #   - "3000:8000"    # 主机3000端口映射到容器8000端口
    ports:
      - "8000:8000"
    
    # =========================================================================
    # 环境变量配置
    # =========================================================================
    environment:
      # Python 输出不缓冲，确保日志实时显示
      - PYTHONUNBUFFERED=1
      
      # 可选: 设置时区
      # - TZ=Asia/Shanghai
      
      # 可选: 设置 Hugging Face 镜像（国内用户加速下载）
      # - HF_ENDPOINT=https://hf-mirror.com
    
    # =========================================================================
    # 数据卷挂载配置
    # =========================================================================
    # 挂载说明:
    # - ./input:/app/input   : 挂载本地 input 目录到容器，用于存放音频文件
    # - ./output:/app/output : 挂载本地 output 目录到容器，用于存放生成的字幕
    # - 如果不需要持久化存储，可以注释掉这两行
    volumes:
      - ./input:/app/input
      - ./output:/app/output
    
    # =========================================================================
    # 资源限制配置（可选，根据服务器配置调整）
    # =========================================================================
    # 内存限制建议:
    # - tiny/base 模型: 2GB 足够
    # - small 模型: 建议 4GB
    # - medium 模型: 建议 8GB
    # - large 模型: 建议 12GB+
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G
    #     reservations:
    #       memory: 2G
    
    # =========================================================================
    # 重启策略
    # =========================================================================
    # unless-stopped: 除非手动停止，否则总是重启
    # always: 总是重启
    # on-failure: 仅在失败时重启
    restart: unless-stopped
    
    # =========================================================================
    # 健康检查配置
    # =========================================================================
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s        # 检查间隔
      timeout: 10s         # 超时时间
      retries: 3           # 重试次数
      start_period: 60s    # 启动后等待时间（首次下载模型需要较长时间）

# =============================================================================
# 网络配置（可选）
# =============================================================================
# 如果需要自定义网络，取消下面的注释:
# networks:
#   default:
#     name: subtitle-network
#     driver: bridge
