name: Build and Push Docker Image

# =============================================================================
# GitHub Actions 工作流: 构建并推送多平台 Docker 镜像到 Docker Hub
# =============================================================================
#
# 触发条件:
# - 推送到 main 分支
# - 创建新的 tag (v*)
# - 手动触发 (workflow_dispatch)
#
# 构建平台:
# - linux/amd64 (x86_64)
# - linux/arm64 (ARM64, Apple Silicon, 树莓派等)
#
# 使用方法:
# 1. 在 GitHub 仓库设置中添加以下 Secrets:
#    - DOCKERHUB_USERNAME: Docker Hub 用户名
#    - DOCKERHUB_TOKEN: Docker Hub 访问令牌 (https://hub.docker.com/settings/security)
#
# 2. 推送代码到 main 分支或创建 tag，自动触发构建
# =============================================================================

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.0.0)'
        required: false
        default: ''

env:
  # Docker Hub 仓库名称
  REGISTRY: docker.io
  IMAGE_NAME: onebigmoon/subtitle-generator

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # =====================================================================
      # 步骤 1: 检出代码
      # =====================================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =====================================================================
      # 步骤 2: 设置 QEMU (用于多平台构建)
      # =====================================================================
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      # =====================================================================
      # 步骤 3: 设置 Docker Buildx
      # =====================================================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      # =====================================================================
      # 步骤 4: 登录 Docker Hub
      # =====================================================================
      - name: Log into Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =====================================================================
      # 步骤 5: 提取元数据 (标签、标签等)
      # =====================================================================
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event.inputs.version != '' }}
          labels: |
            org.opencontainers.image.title=字幕生成器 / 字幕打轴工具
            org.opencontainers.image.description=基于音频和口播稿生成 SRT 字幕文件
            org.opencontainers.image.vendor=onebigmoon

      # =====================================================================
      # 步骤 6: 构建并推送 Docker 镜像
      # =====================================================================
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =====================================================================
      # 步骤 7: 输出构建结果
      # =====================================================================
      - name: Output image digest
        run: |
          echo "✅ Docker 镜像构建成功!"
          echo "📦 镜像地址: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "🏷️  标签: ${{ steps.meta.outputs.tags }}"
          echo "🔑 Digest: ${{ steps.build-and-push.outputs.digest }}"

  # =========================================================================
  # 更新 Docker Hub 描述 (可选)
  # =========================================================================
  update-description:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md
          short-description: "基于音频和口播稿进行字幕打轴，生成带时间戳的 SRT 字幕文件"
